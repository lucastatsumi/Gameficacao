    <rect x="82" y="44" width="2" height="2" fill="#eef2ff"/>
  </g>

  <!-- fase 4: bloqueada (cadeado) -->
  <g>
    <rect x="98" y="8" width="16" height="16" fill="#1e293b"/>
    <rect x="98" y="8" width="16" height="2" fill="#334155"/>
    <rect x="103" y="13" width="6" height="1" fill="#64748b"/>
    <rect x="103" y="12" width="1" height="2" fill="#64748b"/>
    <rect x="108" y="12" width="1" height="2" fill="#64748b"/>
    <rect x="102" y="15" width="8" height="5" fill="#475569"/>
    <rect x="105" y="16" width="2" height="2" fill="#0f172a"/>
  </g>

  <!-- lista ligada flutuando: [42|•] -> [17|Ø] -->
  <g class="hero-flutua-1">
    <rect x="8" y="14" width="14" height="10" fill="#1e1b4b"/>
    <rect x="8" y="14" width="14" height="1" fill="#6366f1"/>
    <rect x="8" y="23" width="14" height="1" fill="#6366f1"/>
    <rect x="8" y="14" width="1" height="10" fill="#6366f1"/>
    <rect x="17" y="14" width="1" height="10" fill="#6366f1"/>
    <rect x="21" y="14" width="1" height="10" fill="#6366f1"/>
    <rect x="11" y="17" width="1" height="4" fill="#c7d2fe"/>
    <rect x="13" y="17" width="2" height="1" fill="#c7d2fe"/>
    <rect x="14" y="18" width="1" height="1" fill="#c7d2fe"/>
    <rect x="13" y="19" width="1" height="1" fill="#c7d2fe"/>
    <rect x="13" y="20" width="2" height="1" fill="#c7d2fe"/>
    <rect x="19" y="18" width="1" height="2" fill="#a5b4fc"/>
    <rect x="22" y="18" width="6" height="2" fill="#6366f1"/>
    <rect x="27" y="16" width="2" height="2" fill="#6366f1"/>
    <rect x="27" y="20" width="2" height="2" fill="#6366f1"/>
  </g>
  <g class="hero-flutua-2">
    <rect x="31" y="14" width="14" height="10" fill="#1e1b4b"/>
    <rect x="31" y="14" width="14" height="1" fill="#6366f1"/>
    <rect x="31" y="23" width="14" height="1" fill="#6366f1"/>
    <rect x="31" y="14" width="1" height="10" fill="#6366f1"/>
    <rect x="40" y="14" width="1" height="10" fill="#6366f1"/>
    <rect x="44" y="14" width="1" height="10" fill="#6366f1"/>
    <rect x="34" y="17" width="1" height="4" fill="#c7d2fe"/>
    <rect x="36" y="17" width="2" height="1" fill="#c7d2fe"/>
    <rect x="37" y="18" width="1" height="3" fill="#c7d2fe"/>
    <rect x="36" y="20" width="1" height="1" fill="#c7d2fe"/>
    <rect x="42" y="18" width="1" height="2" fill="#f87171"/>
  </g>

  <!-- estrelas -->
  <g class="hero-flutua-3" fill="#fbbf24">
    <rect x="62" y="10" width="2" height="2"/>
    <rect x="60" y="12" width="2" height="2"/>
    <rect x="64" y="12" width="2" height="2"/>
    <rect x="62" y="14" width="2" height="2"/>
    <rect x="90" y="64" width="2" height="2" opacity="0.7"/>
    <rect x="30" y="40" width="2" height="2" opacity="0.5"/>
    <rect x="108" y="46" width="2" height="2" opacity="0.6"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" shape-rendering="crispEdges">
  <!-- Ilustração pixel-art própria: trilha de fases do DataQuest -->

  <!-- trilha de blocos ligando as fases -->
  <g fill="#4c1d95">
    <rect x="22" y="76" width="3" height="3"/>
    <rect x="28" y="72" width="3" height="3"/>
    <rect x="34" y="68" width="3" height="3"/>
    <rect x="40" y="64" width="3" height="3"/>
    <rect x="58" y="58" width="3" height="3"/>
    <rect x="64" y="54" width="3" height="3"/>
    <rect x="70" y="50" width="3" height="3"/>
    <rect x="88" y="40" width="3" height="3"/>
    <rect x="93" y="34" width="3" height="3"/>
    <rect x="98" y="28" width="3" height="3"/>
  </g>

  <!-- fase 1: concluída (verde) -->
  <g>
    <rect x="6" y="70" width="16" height="16" fill="#059669"/>
    <rect x="6" y="70" width="16" height="2" fill="#34d399"/>
    <rect x="6" y="84" width="16" height="2" fill="#065f46"/>
    <rect x="10" y="77" width="2" height="2" fill="#ecfdf5"/>

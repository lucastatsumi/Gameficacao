    <rect x="14" y="77" width="2" height="2" fill="#ecfdf5"/>
    <rect x="16" y="75" width="2" height="2" fill="#ecfdf5"/>
  </g>

  <!-- fase 2: concluída (verde) -->
  <g>
    <rect x="42" y="52" width="16" height="16" fill="#059669"/>
    <rect x="42" y="52" width="16" height="2" fill="#34d399"/>
    <rect x="42" y="66" width="16" height="2" fill="#065f46"/>
    <rect x="46" y="59" width="2" height="2" fill="#ecfdf5"/>
    <rect x="48" y="61" width="2" height="2" fill="#ecfdf5"/>
    <rect x="50" y="59" width="2" height="2" fill="#ecfdf5"/>
    <rect x="52" y="57" width="2" height="2" fill="#ecfdf5"/>
  </g>

  <!-- fase 3: atual (indigo, pulsa via CSS .hero-atual) -->
  <g class="hero-atual">
    <rect x="72" y="36" width="18" height="18" fill="#6366f1"/>
